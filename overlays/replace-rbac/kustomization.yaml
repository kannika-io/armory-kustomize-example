apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Include the base
resources:
  - ../../base/

# Patches to replace ClusterRole with Role and ClusterRoleBinding with RoleBinding
patches:
  - target:
      kind: ClusterRole
    patch: |-
      - op: replace
        path: /kind
        value: Role
  - target:
      kind: ClusterRoleBinding
    patch: |-
      - op: replace
        path: /roleRef/kind
        value: Role
  - target:
      kind: ClusterRoleBinding
    patch: |-
      - op: replace
        path: /kind
        value: RoleBinding